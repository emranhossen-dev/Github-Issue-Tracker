<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm text-center">
        <div class="flex justify-center mb-6">
            <img src="./assets/github-logo.png" class="w-20" alt="GitHub Logo">
        </div>

        <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
        <p class="text-gray-500 mb-8">Sign in to manage your issues</p>

        <div class="text-left space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Username</label>
                <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full bg-white border-gray-200">
                <p class="text-xs text-purple-600 mt-1">Default: admin</p>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full bg-white border-gray-200">
                <p class="text-xs text-purple-600 mt-1">Default: admin123</p>
            </div>

            <button id="login-btn" class="btn border-none w-full bg-blue-600 hover:bg-blue-700 text-white mt-4">Sign In</button>
        </div>

        <div class="divider text-xs text-gray-400 my-8 uppercase">OR</div>

        <div class="bg-gray-100 p-6 rounded-xl">
            <p class="text-sm text-gray-500 mb-2">Demo Credentials:</p>
            <p class="text-sm font-bold text-gray-700">Username: <span class="font-normal">admin</span></p>
            <p class="text-sm font-bold text-gray-700">Password: <span class="font-normal">admin123</span></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
